name: "Check code quality for Node.js application"
description: "This run lint command for Node.js application"

inputs:
  checkout:
    required: false
    default: "true"
    description: "Whether to checkout the repository (set to false if already done in a previous step)"
  command:
    required: false
    default: "lint"
    description: "Specify what is the command to lint"
  nodeVersion:
    required: false
    default: "25"
    description: "Node.js version to use"
  pnpmVersion:
    required: false
    description: "PNPM version to use (step skipped when not set)"
  throwOnError:
    required: false
    default: "true"
    description: "Set to false if error should be silenced"
  workingDirectory:
    required: false
    default: "."
    description: "Directory to run lint commands in"

runs:
  using: "composite"
  steps:
  - if: inputs.checkout == 'true'
    name: Checkout repository
    uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

  #- name: Validate package manager
  #  run: |
  #    case "${{ inputs.packageManager }}" in
  #      npm|yarn|pnpm) ;;
  #      *) echo "::error::packageManager must be one of: npm, yarn, pnpm. Got: ${{ inputs.packageManager }}"; exit 1 ;;
  #    esac
  #  shell: bash

  - name: Use Node.js ${{ inputs.nodeVersion }}
    uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
    with:
      node-version: ${{ inputs.nodeVersion }}

  - name: Detect pnpm lockfile
    id: pnpm
    run: |
      if [ -f "${{ inputs.workingDirectory }}/pnpm-lock.yaml" ]; then
        echo "exists=true" >> $GITHUB_OUTPUT
      else
        echo "exists=false" >> $GITHUB_OUTPUT
      fi
    shell: bash

  - name: Setup PNPM
    if: inputs.pnpmVersion != '' || steps.pnpm.outputs.exists == 'true'
    uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
    with:
      version: ${{ inputs.pnpmVersion && inputs.pnpmVersion || '' }}

  - name: Install package manager handler
    run: npm i -g @antfu/ni@30.1.0 --force
    shell: bash

  - name: Install dependencies
    run: ni
    shell: bash
    working-directory: ${{ inputs.workingDirectory }}

  - name: Lint source code
    run: nr ${{ inputs.command }} ${{ inputs.throwOnError == 'false' && '|| true' || '' }}
    shell: bash
    working-directory: ${{ inputs.workingDirectory }}
