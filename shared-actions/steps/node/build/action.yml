name: "Build Node.js application"
description: "This allow to build your Node.js application"

inputs:
  checkout:
    required: false
    default: "true"
    description: "Whether to checkout the repository (set to false if already done in a previous step)"
  command:
    required: false
    default: "build"
    description: "Specify what is the command to build"
  nodeVersion:
    required: false
    default: "25"
    description: "Node.js version to use"
  pnpmVersion:
    required: false
    description: "PNPM version to use (optional; step also runs when pnpm-lock.yaml is present)"
  workingDirectory:
    required: false
    default: "."
    description: "Directory to run build commands in"

runs:
  using: "composite"
  steps:
  - if: inputs.checkout == 'true'
    name: Checkout repository
    uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

  #- name: Validate package manager
  #  run: |
  #    case "${{ inputs.packageManager }}" in
  #      npm|yarn|pnpm) ;;
  #      *) echo "::error::packageManager must be one of: npm, yarn, pnpm. Got: ${{ inputs.packageManager }}"; exit 1 ;;
  #    esac
  #  shell: bash

  - name: Use Node.js ${{ inputs.nodeVersion }}
    uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
    with:
      node-version: ${{ inputs.nodeVersion }}

  - name: Detect pnpm lockfile
    id: pnpm
    run: |
      if [ -f "${{ inputs.workingDirectory }}/pnpm-lock.yaml" ]; then
        echo "exists=true" >> $GITHUB_OUTPUT
      else
        echo "exists=false" >> $GITHUB_OUTPUT
      fi
    shell: bash

  - name: Setup PNPM
    if: inputs.pnpmVersion != '' || steps.pnpm.outputs.exists == 'true'
    uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
    with:
      version: ${{ inputs.pnpmVersion && inputs.pnpmVersion || '' }}

  - name: Install package manager handler
    run: npm i -g @antfu/ni --force
    shell: bash

  - name: Install dependencies
    run: ni
    shell: bash
    working-directory: ${{ inputs.workingDirectory }}

  - name: Build applications
    run: nr ${{ inputs.command }}
    shell: bash
    working-directory: ${{ inputs.workingDirectory }}
