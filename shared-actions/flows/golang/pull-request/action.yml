name: "Pull request flow for Golang project"
description: "This is my standard pipeline for pull request on Golang project"

inputs:
  appId:
    required: true
    description: ID of the Github app
  privateKey:
    required: true
    description: Private key of the Github app
  workingDirectory:
    required: false
    default: "."
    description: "Directory containing the Go project (passed to underlying actions)"

runs:
  using: "composite"
  steps:
    - name: Check code quality 🫆
      uses: tchoupinax/repo-config/shared-actions/golang/golangci@32d33bb1a8e8f1505b3329290731e7657b45d14d # v0.7.4
      with:
        workingDirectory: ${{ inputs.workingDirectory }}

    - name: Check build success 🦫
      uses: tchoupinax/repo-config/shared-actions/golang/goreleaser-build-only@32d33bb1a8e8f1505b3329290731e7657b45d14d # v0.7.4
      with:
        workingDirectory: ${{ inputs.workingDirectory }}

    - name: Autodetect labels 🔍
      uses: tchoupinax/repo-config/shared-actions/dx/automatically-apply-labels@32d33bb1a8e8f1505b3329290731e7657b45d14d # v0.7.4
      with:
        app-id: ${{ inputs.appId }}
        private-key: ${{ inputs.privateKey }}

