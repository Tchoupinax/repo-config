name: "Pull request flow for Golang project"
description: "This is my standard pipeline for pull request on Golang project"

inputs:
  appId:
    required: true
    description: ID of the Github app
  privateKey:
    required: true
    description: Private key of the Github app

runs:
  using: "composite"
  steps:
    - name: Check code quality 🫆
      uses: tchoupinax/repo-config/shared-actions/golang/golangci@1c320d103ae9482b9fe956b3d62034abb8295c5c

    - name: Check build success 🦫
      uses: tchoupinax/repo-config/shared-actions/golang/goreleaser-build-only@1c320d103ae9482b9fe956b3d62034abb8295c5c

    - name: Autodetect labels 🔍
      uses: tchoupinax/repo-config/shared-actions/dx/automatically-apply-labels@1c320d103ae9482b9fe956b3d62034abb8295c5c
      with:
        app-id: ${{ inputs.appId }}
        private-key: ${{ inputs.privateKey }}
