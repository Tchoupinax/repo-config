name: "Pull request flow for Golang project"
description: "This is my standard pipeline for pull request on Golang project"

inputs:
  appId:
    required: true
    description: ID of the Github app
  privateKey:
    required: true
    description: Private key of the Github app
  workingDirectory:
    required: false
    default: "."
    description: "Directory containing the Go project (passed to underlying actions)"

runs:
  using: "composite"
  steps:
    - name: Check code quality 🫆
      uses: tchoupinax/repo-config/shared-actions/golang/golangci@5e9e8d6bf37fda904aa2d0011162d9da060b1168 # v0.8.0
      with:
        workingDirectory: ${{ inputs.workingDirectory }}

    - name: Check build success 🦫
      uses: tchoupinax/repo-config/shared-actions/golang/goreleaser-build-only@5e9e8d6bf37fda904aa2d0011162d9da060b1168 # v0.8.0
      with:
        workingDirectory: ${{ inputs.workingDirectory }}

    - name: Autodetect labels 🔍
      uses: tchoupinax/repo-config/shared-actions/dx/automatically-apply-labels@5e9e8d6bf37fda904aa2d0011162d9da060b1168 # v0.8.0
      with:
        app-id: ${{ inputs.appId }}
        private-key: ${{ inputs.privateKey }}

