name: Pull request checks 🔎

on:
  pull_request:


jobs:
  autodetect-labels:
    name: Autodetect labels 🔍
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Run autodetection
      uses: ./shared-actions/steps/dx/automatically-apply-labels
      with:
        appId: ${{ secrets.DEPLOY_APP_ID }}
        privateKey: ${{ secrets.DEPLOY_APP_KEY }}

  action-docs:
    name: "Validate shared-actions docs"
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '24'

    - name: Generate action docs
      run: bash scripts/generate-actions-docs.sh

    - name: Ensure no docs changes
      run: |
        if ! git diff --quiet; then
          echo "Shared action docs are out of date. Please run 'bash scripts/generate-actions-docs.sh' and commit the changes."
          git diff
          exit 1
        fi

  plan:
    name: "Plan terraform"
    runs-on: ubuntu-latest

    steps:
    - name: Clone repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Check if changes occured
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      id: filter
      with:
        filters: |
          tf_files:
            - ./*.tf
            - ./contents/data.yaml
            - ./contents/renovate.json
            - ./modules/*.tf

    - if: steps.filter.outputs.tf_files == 'false'
      name: Skip (no Terraform files changed)
      run: |
        echo "### ✅ Plan Skipped" >> $GITHUB_STEP_SUMMARY
        echo "No Terraform files changed." >> $GITHUB_STEP_SUMMARY
      shell: bash

    - if: steps.filter.outputs.tf_files == 'true'
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      id: app-token
      with:
        app-id: ${{ secrets.DEPLOY_APP_ID }}
        private-key: ${{ secrets.DEPLOY_APP_KEY }}

    - if: steps.filter.outputs.tf_files == 'true'
      uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

    - if: steps.filter.outputs.tf_files == 'true'
      run: |
        terraform init \
          -backend-config="access_key=${{ secrets.SCW_ACCESS_KEY }}" \
          -backend-config="secret_key=${{ secrets.SCW_SECRET_KEY }}" \
          -backend-config="bucket=${{ secrets.SCW_BUCKET_NAME }}"

    - if: steps.filter.outputs.tf_files == 'true'
      name: Perform plan
      id: plan
      env:
        GITHUB_TOKEN: ${{ secrets.TTOKEN }}
      run: terraform plan -no-color -out terraform.plan

    - if: steps.filter.outputs.tf_files == 'true'
      run: terraform show -no-color terraform.plan > terraform.text

    - if: steps.filter.outputs.tf_files == 'true'
      run: terraform show -json terraform.plan > terraform.json

    # https://github.com/marketplace/actions/terraform-pull-request-report-generator
    - if: steps.filter.outputs.tf_files == 'true'
      uses: ahmadnassri/action-terraform-report@9f0b1f4b72ee07f96e3196f74566418aa8e85648 # v5.1.1
      with:
        github-token: ${{ steps.app-token.outputs.token }}
        remove-stale-reports: true
        terraform-json: ${{ github.workspace }}/terraform.json
        terraform-text: ${{ github.workspace }}/terraform.text
